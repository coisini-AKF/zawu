<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fff3f7" />
    <title>武士杰</title>
    <meta name="description" content="送给武士杰的小小祝福页面。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="武士杰" />
    <meta property="og:description" content="愿你一直可爱，一直被温柔照亮。" />
    <meta property="og:image" content="./share-card.svg" />
    <link rel="icon" href="./share-card.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page" aria-label="武士杰">
      <section class="poster">
        <span class="bubble bubble-one" aria-hidden="true"></span>
        <span class="bubble bubble-two" aria-hidden="true"></span>
        <span class="ribbon" aria-hidden="true"></span>

        <img class="sticker sticker-peek" src="./assets/kitty-peek.svg" alt="探头小猫表情" />
        <img class="sticker sticker-bounce" src="./assets/bunny-bounce.svg" alt="蹦跳小兔表情" />
        <img class="sticker sticker-love" src="./assets/bear-love.svg" alt="爱心小熊表情" />
        <img class="sticker sticker-soft" src="./assets/cloud-cat.svg" alt="软乎小猫表情" />

        <p class="eyebrow">For You</p>
        <h1>武士杰</h1>
        <div class="wish" aria-label="祝福寄语">
          <span class="dot dot-left" aria-hidden="true"></span>
          <p>愿你每天都有小惊喜，</p>
          <p>心事被风轻轻接住。</p>
          <p>做闪闪发光的自己，</p>
          <p>也被世界温柔喜欢。</p>
          <span class="dot dot-right" aria-hidden="true"></span>
        </div>
      </section>
    </main>
  </body>
</html>
