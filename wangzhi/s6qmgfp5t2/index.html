<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7efe7" />
    <title>方方</title>
    <meta name="description" content="方方" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="方方" />
    <meta property="og:description" content="送给方方的小小祝福页面。" />
    <meta property="og:image" content="./share-card.svg" />
    <link rel="icon" href="./share-card.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page" aria-label="方方">
      <section class="hero">
        <div class="halo" aria-hidden="true"></div>
        <img class="sticker sticker-wave" src="./assets/dog-wave.svg" alt="线条小狗挥手" />
        <img class="sticker sticker-heart" src="./assets/dog-heart.svg" alt="线条小狗爱心" />
        <img class="sticker sticker-flower" src="./assets/dog-flower.svg" alt="线条小狗小花" />
        <p class="eyebrow">A tiny gift</p>
        <h1>方方</h1>
        <div class="wish" aria-label="祝福寄语">
          <span class="sparkle" aria-hidden="true"></span>
          <p>愿你一抬头就遇见好天气，</p>
          <p>一转身就撞见小确幸。</p>
          <p>慢慢闪光，天天开心。</p>
          <span class="sparkle sparkle-right" aria-hidden="true"></span>
        </div>
      </section>
    </main>
  </body>
</html>
